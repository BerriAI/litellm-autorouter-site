<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request received · LiteLLM AutoRouter</title>
  <style>
    :root { --ink:#172018; --muted:#667064; --green:#31c55b; --green-dark:#157a34; --paper:#f7f8f4; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--paper); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { max-width:660px; padding:56px; border:1px solid #dce2d8; border-radius:28px; background:white; box-shadow:0 24px 80px rgba(23,32,24,.08); text-align:center; }
    .mark { width:48px; height:48px; margin:0 auto 24px; border-radius:15px; display:grid; place-items:center; background:#eaffef; color:var(--green-dark); font-size:24px; font-weight:800; }
    h1 { margin:0 0 14px; font-size:clamp(38px,7vw,64px); line-height:.98; letter-spacing:-.05em; }
    p { margin:0 auto 28px; max-width:500px; color:var(--muted); font-size:18px; line-height:1.6; }
    a { display:inline-flex; align-items:center; padding:13px 18px; border-radius:12px; background:var(--ink); color:white; text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <main>
    <div class="mark">✓</div>
    <h1>Your request is in.</h1>
    <p>Thanks for your interest in LiteLLM AutoRouter. We’ll review your workload and follow up with beta fit and next steps.</p>
    <a href="/">Back to AutoRouter</a>
  </main>
</body>
</html>
